name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install .

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy .

      - name: Tests
        run: pytest

      - name: Security scan
        run: pip install pip-audit && pip-audit

      - name: Docker build
        run: docker build -f deployment/Dockerfile -t app .

      - name: Migration dry-run
        run: alembic upgrade head --sql > /dev/null

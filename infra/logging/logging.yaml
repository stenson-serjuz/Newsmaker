version: 1

formatters:
  json:
    format: >
      {"ts":"%(asctime)s",
       "level":"%(levelname)s",
       "logger":"%(name)s",
       "msg":"%(message)s",
       "trace_id":"%(trace_id)s"}

handlers:
  console:
    class: logging.StreamHandler
    formatter: json

root:
  level: INFO
  handlers: [console]

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sources</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background: #f5f5f5;
        }

        h1 {
            margin-bottom: 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 14px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #222;
            color: white;
        }

        tr:hover {
            background: #fafafa;
        }

        .badge {
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
        }

        .active {
            background: #d1fae5;
            color: #065f46;
        }

        .inactive {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>

<h1>Sources</h1>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Parser</th>
            <th>URL</th>
            <th>Status</th>
        </tr>
    </thead>

    <tbody>
        {% for source in sources %}
        <tr>
            <td>{{ source.name }}</td>
            <td>{{ source.type }}</td>
            <td>{{ source.parser }}</td>
            <td>{{ source.url }}</td>

            <td>
                {% if source.is_active %}
                    <span class="badge active">
                        ACTIVE
                    </span>
                {% else %}
                    <span class="badge inactive">
                        DISABLED
                    </span>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

</body>
</html>

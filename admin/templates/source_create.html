<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Source</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 40px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 32px;
            border-radius: 12px;
        }

        h1 {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-top: 18px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        button {
            margin-top: 24px;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            background: #111827;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Create Source</h1>

    <form method="post">

        <label>Name</label>
        <input
            type="text"
            name="name"
            required
        >

        <label>Type</label>
        <select name="type">

            <option value="rss">
                RSS
            </option>

        </select>

        <label>URL</label>
        <input
            type="url"
            name="url"
            required
        >

        <label>Parser Key</label>
        <input
            type="text"
            name="parser_key"
            value="advanced_rss"
            required
        >

        <button type="submit">
            Create Source
        </button>

    </form>

</div>

</body>
</html>
